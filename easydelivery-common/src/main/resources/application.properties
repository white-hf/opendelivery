server.port=9000

spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/opendelivery?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:uniuni_hf}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=5000

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=false
spring.flyway.validate-on-migrate=true

# Persistence ADR: Flyway is the only schema source; JPA never generates DDL.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

spring.messages.basename=i18n/messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

opendelivery.security.upstream-api-key=${UPSTREAM_API_KEY:e2e-upstream-key}
opendelivery.security.operations-api-key=${OPERATIONS_API_KEY:e2e-operations-key}
opendelivery.security.legacy-ops-api-key-enabled=${LEGACY_OPS_API_KEY_ENABLED:true}
opendelivery.pod.storage-path=${POD_STORAGE_PATH:./data/pod}

# Enable multipart file uploads up to 10MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging Configuration
logging.file.name=${LOG_FILE_PATH:./logs/easydelivery.log}
logging.level.root=INFO
logging.level.com.hf.easydelivery=INFO
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7

